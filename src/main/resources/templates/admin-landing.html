<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <style>
        #sidebarMenu {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #fff;
            border-right: 1px solid #ddd;
        }

        main {
            margin-left: 250px;
        }

        .dashboard-circles {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .circle-container {
            text-align: center;
            flex: 1;
            min-width: 180px;
        }

        .circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 10px solid #002b5c;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
        }

        .percent {
            font-size: 36px;
            font-weight: bold;
            color: black;
        }

        .label {
            margin-top: 10px;
            font-size: 16px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <!-- Include Admin Header -->
    <header th:replace="fragments/admin-header :: admin-header"></header>

    <!-- Main Content -->
    <main>
        <div class="container mt-4">

            <!-- Dashboard Circles -->
            <div class="dashboard-circles">

                <!-- Banned Members -->
                <div class="circle-container">
                    <div class="circle">
                        <span class="percent" th:text="${bannedMembersCount}">0</span>
                    </div>
                    <div class="label">Banned Members</div>
                </div>

                <!-- Flagged Transactions -->
                <div class="circle-container">
                    <div class="circle">
                        <span class="percent" th:text="${flaggedTxnsCount}">0</span>
                    </div>
                    <div class="label">Flagged Transactions</div>
                </div>

                <!-- System Flagged Transactions -->
                <div class="circle-container">
                    <div class="circle">
                        <span class="percent" th:text="${systemFlaggedTxnsCount}">0</span>
                    </div>
                    <div class="label">System Flagged Transactions</div>
                </div>

                <!-- Reported Posts -->
                <div class="circle-container">
                    <div class="circle">
                        <span class="percent" th:text="${reportedPostsCount}">0</span>
                    </div>
                    <div class="label">Reported Posts</div>
                </div>

            </div>
        </div>
    </main>
</body>

</html>
